name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build daemon
        run: go build -o bin/auxitalkd ./cmd/auxitalkd

      - name: Build CLI
        run: go build -o bin/auxitalkctl ./cmd/auxitalkctl
